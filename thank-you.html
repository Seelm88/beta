<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
                :root {
            --bg-dark: #0b0c10;
            --bg-card: rgba(31, 40, 51, 0.9);
            --primary: #66fcf1;
            --secondary: #45a29e;
            --text-main: #c5c6c7;
            --accent-red: #c0392b;
            --accent-red-hover: #e74c3c;
        }
body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* STATISK BAGGRUND (Selve siden) */
            background-image: linear-gradient(rgba(11, 12, 16, 0.7), rgba(11, 12, 16, 0.7)), 
                              url('bakgrund.jpg');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            /* HEADER (Top sektionen) */
        header {
            width: 80%;
            height: 400px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                url('https://i.imgur.com/MYxqJCY.jpeg') center;
            background-size: 100% auto;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
    
            /* Ramar - matchar din border-bottom */
            border-bottom: 4px solid var(--secondary);
            border-left: 4px solid var(--secondary);
            border-right: 4px solid var(--secondary);

            /* Runda av alla hörn */
            border-radius: 15px;
    
            box-sizing: border-box;
            margin-top: 20px; /* Ger lite distans från toppen av sidan */
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #ffffff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        header p {
            font-style: italic;
            font-size: 1.2rem;
            color: var(--primary);
        }

        /* Navigation */
        nav {
            margin-top: -30px;
            display: flex;
            gap: 15px;
            z-index: 30; /* Ligger ovanför headern */
        }

        .nav-btn {
            background: #1f2833;
            color: var(--primary);
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--secondary);
            border-radius: 5px;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .nav-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            transform: translateY(-3px);
        }

        /* Content Structure */
        .container {
            max-width: 900px;
            width: 90%;
            margin: 60px 0;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        h2 { color: var(--primary); border-bottom: 1px solid var(--secondary); padding-bottom: 10px; margin-top: 0; }
        h3 { color: var(--secondary); margin-top: 20px; }

        ul { list-style: none; padding-left: 0; }
        li { margin-bottom: 12px; line-height: 1.6; }
        .check { color: var(--primary); font-weight: bold; margin-right: 8px; }

        /* Donation Card */
        .ThankYou-box {
            text-align: center;
            background: linear-gradient(145deg, #1f2833, #0b0c10);
        }

        .ThankYou-btn {
            background: var(--accent-red);
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .ThankYou-btn:hover { 
            background: var(--accent-red-hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
        <div class="card ThankYou-box">
            <h2>ThankYou!</h2>
            <p>Your server rental inquiry has been successfully submitted. We will get back to you shortly!</p>
            <a href="index.html" target="_blank" style="text-decoration: none;">
                <button class="ThankYou-btn">Return to Homepage</button>
            </a>
        </div>
</body>
</html>
